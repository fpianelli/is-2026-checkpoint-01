<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamBoard App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .status-indicator { margin-top: 10px; font-weight: bold; }
        .online { color: green; }
        .offline { color: red; }
    </style>
</head>
<body>
    <h1>TeamBoard - Grupo MISION APOLO</h1>
    
    <div class="status-indicator">
        Estado del Backend: <span id="backend-status">Comprobando...</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Legajo</th>
                <th>Feature</th>
                <th>Servicio</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody id="team-table-body">
            </tbody>
    </table>

    <script src="app.js"></script>
</body>
</html>
