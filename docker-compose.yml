services:
  portainer:
   image: portainer/portainer-ce:latest
   container_name: portainer
   restart: always
   ports:
    - "9000:9000"
   volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - portainer_data:/data
   networks:
    - teamboard-net
   deploy:
     resources:
       limits: 
         cpus: "0.25"
         memory: 256M
  

  database:
    image: postgres:16-alpine # Esto es lo que pidió ema
    container_name: database
    restart: always # Esto es lo vi por default, pero no se si es necesario
    env_file:
      - .env
    environment: # Esto es para darle una configuración inicial cuando inicia
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - teamboard-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DB_HOST: database
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
  
  pgadmin:
    image: dpage/pgadmin4:9.13 # Ema nos recomendó nunca usar la última versión, así que puse una anterior
    container_name: pgadmin
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - database
    networks:
      - teamboard-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  teamboard-net:
    driver: bridge


volumes:
  db_data:
  portainer_data:
